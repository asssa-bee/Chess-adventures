<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Характеристики персонажа</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1a2e;
            color: #eee;
            font-family: 'Georgia', serif;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            text-align: center;
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: #f0c040;
            text-shadow: 0 0 10px rgba(240,192,64,0.5);
            letter-spacing: 2px;
        }

        /* === СЧЁТЧИК ХОДОВ === */
        .turn-card {
            width: 100%;
            max-width: 400px;
            background: linear-gradient(135deg, #2a2a0a, #4a4a10);
            border: 1px solid #f0c040;
            border-radius: 20px;
            padding: 16px 20px;
            margin-bottom: 20px;
            box-shadow: 0 0 20px rgba(240,192,64,0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .turn-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #f0c040;
        }

        .turn-display {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .turn-value {
            font-size: 3rem;
            font-weight: bold;
            color: #f0c040;
            text-shadow: 0 0 12px rgba(240,192,64,0.6);
            min-width: 80px;
            text-align: center;
            line-height: 1;
        }

        .turn-btn {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            border: 2px solid #f0c040;
            background: rgba(240,192,64,0.15);
            color: #f0c040;
            font-size: 1.6rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s, background 0.2s;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        .turn-btn:active {
            transform: scale(0.88);
            background: rgba(240,192,64,0.35);
        }

        .turn-next-btn {
            width: 100%;
            padding: 11px;
            border-radius: 30px;
            border: 2px solid #f0c040;
            background: rgba(240,192,64,0.2);
            color: #f0c040;
            font-size: 0.95rem;
            font-family: 'Georgia', serif;
            letter-spacing: 2px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            -webkit-tap-highlight-color: transparent;
        }

        .turn-next-btn:active {
            transform: scale(0.97);
            background: rgba(240,192,64,0.4);
        }

        /* === КАРТОЧКИ ХАРАКТЕРИСТИК === */
        .stats-container {
            display: flex;
            flex-direction: column;
            gap: 14px;
            width: 100%;
            max-width: 400px;
        }

        .stat-card {
            border-radius: 16px;
            padding: 14px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            gap: 10px;
        }

        .stat-card.hearts   { background: linear-gradient(135deg, #3d0a0a, #6b1515); border: 1px solid #c0392b; }
        .stat-card.clubs    { background: linear-gradient(135deg, #0a2e0a, #1a5c1a); border: 1px solid #27ae60; }
        .stat-card.diamonds { background: linear-gradient(135deg, #0a1a3d, #1a3a7a); border: 1px solid #2980b9; }
        .stat-card.spades   { background: linear-gradient(135deg, #1a0a3d, #3a1a6b); border: 1px solid #8e44ad; }

        .stat-icon-label {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 54px;
        }

        .stat-icon { font-size: 2rem; line-height: 1; }
        .hearts .stat-icon   { color: #ff4d4d; }
        .clubs .stat-icon    { color: #4dff88; }
        .diamonds .stat-icon { color: #4db8ff; }
        .spades .stat-icon   { color: #cc88ff; }

        .stat-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(255,255,255,0.6);
            margin-top: 3px;
        }

        .stat-name {
            flex: 1;
            font-size: 1rem;
            font-weight: bold;
            color: #fff;
            text-align: center;
        }

        .stat-controls {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: none;
            font-size: 1.4rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s, opacity 0.2s;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            line-height: 1;
        }

        .btn:active { transform: scale(0.88); opacity: 0.8; }
        .btn-minus { background: rgba(255,255,255,0.15); color: #fff; border: 1px solid rgba(255,255,255,0.3); }
        .btn-plus  { background: rgba(255,255,255,0.25); color: #fff; border: 1px solid rgba(255,255,255,0.5); }

        .stat-value {
            font-size: 1.7rem;
            font-weight: bold;
            min-width: 42px;
            text-align: center;
            color: #fff;
            text-shadow: 0 0 8px rgba(255,255,255,0.4);
        }

        /* === РАНДОМАЙЗЕР КАРТЫ === */
        .randomizer-card {
            width: 100%;
            max-width: 400px;
            background: linear-gradient(135deg, #1a0a2e, #2e1a4a);
            border: 1px solid #9b59b6;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 0 25px rgba(155,89,182,0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .randomizer-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #cc88ff;
        }

        /* Визуальная игральная карта */
        .playing-card-wrap {
            perspective: 600px;
        }

        .playing-card {
            width: 140px;
            height: 200px;
            border-radius: 14px;
            background: #fff;
            box-shadow: 0 8px 32px rgba(0,0,0,0.6), 0 0 0 2px rgba(255,255,255,0.15);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            transform-style: preserve-3d;
            transition: transform 0.05s;
            cursor: default;
            user-select: none;
        }

        .playing-card.flipping {
            animation: cardFlip 0.5s ease-in-out;
        }

        @keyframes cardFlip {
            0%   { transform: rotateY(0deg) scale(1); }
            40%  { transform: rotateY(90deg) scale(1.08); }
            60%  { transform: rotateY(90deg) scale(1.08); }
            100% { transform: rotateY(0deg) scale(1); }
        }

        /* Рубашка */
        .card-back {
            width: 140px;
            height: 200px;
            border-radius: 14px;
            background: linear-gradient(135deg, #1a237e, #283593);
            box-shadow: 0 8px 32px rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .card-back::before {
            content: '';
            position: absolute;
            inset: 8px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 8px;
        }

        .card-back::after {
            content: '🂠';
            font-size: 5rem;
            opacity: 0.15;
        }

        .card-back-pattern {
            position: absolute;
            inset: 0;
            background-image:
                repeating-linear-gradient(45deg, rgba(255,255,255,0.03) 0px, rgba(255,255,255,0.03) 2px, transparent 2px, transparent 10px),
                repeating-linear-gradient(-45deg, rgba(255,255,255,0.03) 0px, rgba(255,255,255,0.03) 2px, transparent 2px, transparent 10px);
            border-radius: 14px;
        }

        /* Лицевая сторона карты */
        .card-face {
            width: 100%;
            height: 100%;
            position: relative;
            padding: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 14px;
        }

        .card-corner {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            line-height: 1;
            gap: 1px;
        }

        .card-corner.top-left  { top: 7px; left: 9px; }
        .card-corner.bot-right { bottom: 7px; right: 9px; transform: rotate(180deg); }

        .corner-rank {
            font-size: 1.1rem;
            font-weight: 900;
            line-height: 1;
        }

        .corner-suit {
            font-size: 0.85rem;
            line-height: 1;
        }

        .card-center {
            font-size: 4rem;
            line-height: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }

        .card-center-suit {
            font-size: 3.5rem;
        }

        .card-center-rank {
            font-size: 1.4rem;
            font-weight: 900;
            letter-spacing: -1px;
        }

        /* Джокер */
        .card-joker .card-center {
            font-size: 3rem;
        }

        .card-color-red  { color: #d32f2f; }
        .card-color-black { color: #212121; }

        /* Полоска масти снизу карты */
        .card-suit-bar {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 6px;
            border-radius: 0 0 14px 14px;
            opacity: 0.5;
        }

        /* Название карты под ней */
        .card-name-label {
            font-size: 1.1rem;
            font-weight: bold;
            color: #e0c8ff;
            text-align: center;
            letter-spacing: 1px;
            min-height: 1.5rem;
            text-shadow: 0 0 8px rgba(180,120,255,0.5);
        }

        .rand-btn {
            width: 100%;
            padding: 13px;
            border-radius: 30px;
            border: 2px solid #9b59b6;
            background: linear-gradient(135deg, rgba(155,89,182,0.3), rgba(155,89,182,0.15));
            color: #cc88ff;
            font-size: 1rem;
            font-family: 'Georgia', serif;
            letter-spacing: 2px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            -webkit-tap-highlight-color: transparent;
        }

        .rand-btn:active {
            transform: scale(0.97);
            background: linear-gradient(135deg, rgba(155,89,182,0.5), rgba(155,89,182,0.3));
        }

        .card-history {
            width: 100%;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            justify-content: center;
            max-height: 80px;
            overflow-y: auto;
        }

        .history-chip {
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.78rem;
            font-weight: bold;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            color: #ddd;
            white-space: nowrap;
        }

        .history-chip.red   { color: #ff8888; border-color: rgba(255,100,100,0.3); }
        .history-chip.black { color: #cccccc; border-color: rgba(200,200,200,0.2); }
        .history-chip.joker { color: #ffdd44; border-color: rgba(255,200,0,0.35); }

        .deck-counter {
            font-size: 0.78rem;
            color: rgba(255,255,255,0.45);
            letter-spacing: 1px;
        }

        /* === СБРОС === */
        .reset-btn {
            margin-top: 22px;
            margin-bottom: 30px;
            padding: 13px 38px;
            background: linear-gradient(135deg, #333, #555);
            color: #f0c040;
            border: 1px solid #f0c040;
            border-radius: 30px;
            font-size: 0.95rem;
            letter-spacing: 2px;
            cursor: pointer;
            font-family: 'Georgia', serif;
            transition: background 0.2s, transform 0.1s;
            -webkit-tap-highlight-color: transparent;
        }

        .reset-btn:active {
            transform: scale(0.95);
            background: linear-gradient(135deg, #444, #666);
        }
    </style>
</head>
<body>

    <h1>⚔️ Персонаж</h1>

    <!-- СЧЁТЧИК ХОДОВ -->
    <div class="turn-card">
        <div class="turn-title">⏱ Ход</div>
        <div class="turn-display">
            <button class="turn-btn" onclick="changeTurn(-1)">−</button>
            <div class="turn-value" id="turn">1</div>
            <button class="turn-btn" onclick="changeTurn(1)">+</button>
        </div>
        <button class="turn-next-btn" onclick="changeTurn(1)">➤ Следующий ход</button>
    </div>

    <!-- ХАРАКТЕРИСТИКИ -->
    <div class="stats-container">

        <div class="stat-card hearts">
            <div class="stat-icon-label">
                <span class="stat-icon">♥</span>
                <span class="stat-label">Червы</span>
            </div>
            <div class="stat-name">HP</div>
            <div class="stat-controls">
                <button class="btn btn-minus" onclick="change('hp', -1)">−</button>
                <span class="stat-value" id="hp">10</span>
                <button class="btn btn-plus" onclick="change('hp', 1)">+</button>
            </div>
        </div>

        <div class="stat-card clubs">
            <div class="stat-icon-label">
                <span class="stat-icon">♣</span>
                <span class="stat-label">Трефы</span>
            </div>
            <div class="stat-name">Атака</div>
            <div class="stat-controls">
                <button class="btn btn-minus" onclick="change('attack', -1)">−</button>
                <span class="stat-value" id="attack">5</span>
                <button class="btn btn-plus" onclick="change('attack', 1)">+</button>
            </div>
        </div>

        <div class="stat-card diamonds">
            <div class="stat-icon-label">
                <span class="stat-icon">♦</span>
                <span class="stat-label">Бубны</span>
            </div>
            <div class="stat-name">Захват</div>
            <div class="stat-controls">
                <button class="btn btn-minus" onclick="change('capture', -1)">−</button>
                <span class="stat-value" id="capture">3</span>
                <button class="btn btn-plus" onclick="change('capture', 1)">+</button>
            </div>
        </div>

        <div class="stat-card spades">
            <div class="stat-icon-label">
                <span class="stat-icon">♠</span>
                <span class="stat-label">Пики</span>
            </div>
            <div class="stat-name">Защита</div>
            <div class="stat-controls">
                <button class="btn btn-minus" onclick="change('defense', -1)">−</button>
                <span class="stat-value" id="defense">7</span>
                <button class="btn btn-plus" onclick="change('defense', 1)">+</button>
            </div>
        </div>

    </div>

    <!-- РАНДОМАЙЗЕР КАРТЫ -->
    <div class="randomizer-card">
        <div class="randomizer-title">🃏 Вытянуть карту</div>

        <!-- Визуальная карта -->
        <div class="playing-card-wrap">
            <div class="playing-card" id="playingCard">
                <!-- Рубашка по умолчанию -->
                <div class="card-back" id="cardBack">
                    <div class="card-back-pattern"></div>
                </div>
            </div>
        </div>

        <div class="card-name-label" id="cardNameLabel">— нажмите кнопку —</div>
        <div class="deck-counter" id="deckCounter">Колода: 54 карты</div>

        <button class="rand-btn" onclick="drawCard()">🎴 Вытянуть карту</button>
        <button class="rand-btn" style="background:rgba(80,80,80,0.3);border-color:#666;color:#aaa;font-size:0.85rem;padding:9px;margin-top:-6px;" onclick="resetDeck()">♻️ Перемешать колоду</button>

        <!-- История -->
        <div style="width:100%;font-size:0.72rem;color:rgba(255,255,255,0.4);letter-spacing:1px;text-align:center;">ИСТОРИЯ</div>
        <div class="card-history" id="cardHistory"></div>
    </div>

    <button class="reset-btn" onclick="resetAll()">🔄 Полный сброс</button>

    <script>
        /* =========================================================
           ХАРАКТЕРИСТИКИ
        ========================================================= */
        const stats = {
            hp:      { value: 10, min: 0 },
            attack:  { value: 5,  min: 0 },
            capture: { value: 3,  min: 0 },
            defense: { value: 7,  min: 0 },
        };

        let turn = 1;

        function changeTurn(delta) {
            turn = Math.max(1, turn + delta);
            document.getElementById('turn').textContent = turn;
        }

        function change(stat, delta) {
            const s = stats[stat];
            s.value = Math.max(s.min, s.value + delta);
            document.getElementById(stat).textContent = s.value;
        }

        /* =========================================================
           КОЛОДА 54 КАРТЫ
        ========================================================= */
        const SUITS = [
            { name: 'Червы',  sym: '♥', color: 'red',   bar: '#e53935' },
            { name: 'Бубны',  sym: '♦', color: 'red',   bar: '#e53935' },
            { name: 'Трефы',  sym: '♣', color: 'black', bar: '#37474f' },
            { name: 'Пики',   sym: '♠', color: 'black', bar: '#37474f' },
        ];

        const RANKS = [
            { name: 'Туз',    short: 'A'  },
            { name: '2',      short: '2'  },
            { name: '3',      short: '3'  },
            { name: '4',      short: '4'  },
            { name: '5',      short: '5'  },
            { name: '6',      short: '6'  },
            { name: '7',      short: '7'  },
            { name: '8',      short: '8'  },
            { name: '9',      short: '9'  },
            { name: '10',     short: '10' },
            { name: 'Валет',  short: 'J'  },
            { name: 'Дама',   short: 'Q'  },
            { name: 'Король', short: 'K'  },
        ];

        function buildDeck() {
            const deck = [];
            for (const suit of SUITS) {
                for (const rank of RANKS) {
                    deck.push({ type: 'card', suit, rank });
                }
            }
            deck.push({ type: 'joker', color: 'red',   name: 'Красный Джокер' });
            deck.push({ type: 'joker', color: 'black', name: 'Чёрный Джокер'  });
            return deck;
        }

        function shuffle(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        let deck    = shuffle(buildDeck());
        let history = [];
        let isAnimating = false;

        /* =========================================================
           РЕНДЕР КАРТЫ
        ========================================================= */
        function renderCard(cardData) {
            const cardEl = document.getElementById('playingCard');

            if (cardData === null) {
                // Рубашка
                cardEl.innerHTML = `
                    <div class="card-back">
                        <div class="card-back-pattern"></div>
                    </div>`;
                return;
            }

            if (cardData.type === 'joker') {
                const isRed = cardData.color === 'red';
                const colorClass = isRed ? 'card-color-red' : 'card-color-black';
                const barColor   = isRed ? '#e53935' : '#37474f';
                const emoji      = isRed ? '🃏' : '🃟';

                cardEl.innerHTML = `
                    <div class="card-face card-joker ${colorClass}">
                        <div class="card-corner top-left">
                            <span class="corner-rank" style="font-size:0.9rem;">Jo</span>
                            <span class="corner-suit">🃏</span>
                        </div>
                        <div class="card-center">
                            <span style="font-size:3.5rem;">${emoji}</span>
                            <span style="font-size:1rem;font-weight:900;letter-spacing:1px;">JOKER</span>
                        </div>
                        <div class="card-corner bot-right">
                            <span class="corner-rank" style="font-size:0.9rem;">Jo</span>
                            <span class="corner-suit">🃏</span>
                        </div>
                        <div class="card-suit-bar" style="background:${barColor};"></div>
                    </div>`;
            } else {
                const { suit, rank } = cardData;
                const colorClass = suit.color === 'red' ? 'card-color-red' : 'card-color-black';

                // Большой символ масти в центре (повторяется в зависимости от ранга)
                cardEl.innerHTML = `
                    <div class="card-face ${colorClass}">
                        <div class="card-corner top-left">
                            <span class="corner-rank">${rank.short}</span>
                            <span class="corner-suit">${suit.sym}</span>
                        </div>
                        <div class="card-center">
                            <span class="card-center-suit">${suit.sym}</span>
                            <span class="card-center-rank">${rank.short}</span>
                        </div>
                        <div class="card-corner bot-right">
                            <span class="corner-rank">${rank.short}</span>
                            <span class="corner-suit">${suit.sym}</span>
                        </div>
                        <div class="card-suit-bar" style="background:${suit.bar};"></div>
                    </div>`;
            }
        }

        /* =========================================================
           ВЫТЯНУТЬ КАРТУ
        ========================================================= */
        function drawCard() {
            if (isAnimating) return;

            if (deck.length === 0) {
                document.getElementById('cardNameLabel').textContent = '🚫 Колода закончилась!';
                return;
            }

            isAnimating = true;
            const cardEl = document.getElementById('playingCard');

            // Запускаем анимацию и на полпути меняем карту
            cardEl.classList.remove('flipping');
            void cardEl.offsetWidth; // reflow
            cardEl.classList.add('flipping');

            // На середине анимации (250мс) меняем контент
            setTimeout(() => {
                const drawn = deck.pop();
                renderCard(drawn);
                updateLabel(drawn);
                addHistory(drawn);
                updateCounter();
            }, 220);

            setTimeout(() => {
                cardEl.classList.remove('flipping');
                isAnimating = false;
            }, 500);
        }

        function updateLabel(cardData) {
            const label = document.getElementById('cardNameLabel');
            if (cardData.type === 'joker') {
                label.textContent = cardData.name;
                label.style.color = cardData.color === 'red' ? '#ff8888' : '#cccccc';
            } else {
                label.textContent = `${cardData.rank.name} ${cardData.suit.name}`;
                label.style.color = cardData.suit.color === 'red' ? '#ff9999' : '#e0c8ff';
            }
        }

        function updateCounter() {
            const el = document.getElementById('deckCounter');
            const left = deck.length;
            el.textContent = left > 0
                ? `Колода: ${left} ${cardWord(left)}`
                : '🃏 Колода пуста';
        }

        function cardWord(n) {
            if (n % 100 >= 11 && n % 100 <= 19) return 'карт';
            const r = n % 10;
            if (r === 1) return 'карта';
            if (r >= 2 && r <= 4) return 'карты';
            return 'карт';
        }

        function addHistory(cardData) {
            history.unshift(cardData);
            if (history.length > 20) history.pop();
            renderHistory();
        }

        function renderHistory() {
            const container = document.getElementById('cardHistory');
            container.innerHTML = '';
            for (const c of history) {
                const chip = document.createElement('div');
                chip.className = 'history-chip';

                if (c.type === 'joker') {
                    chip.classList.add('joker');
                    chip.textContent = c.color === 'red' ? '🃏 Jkr' : '🃟 Jkr';
                } else {
                    chip.classList.add(c.suit.color);
                    chip.textContent = `${c.rank.short}${c.suit.sym}`;
                }

                container.appendChild(chip);
            }
        }

        /* =========================================================
           СБРОС КОЛОДЫ
        ========================================================= */
        function resetDeck() {
            deck    = shuffle(buildDeck());
            history = [];
            renderCard(null);
            document.getElementById('cardNameLabel').textContent = '— нажмите кнопку —';
            document.getElementById('cardNameLabel').style.color = '#e0c8ff';
            document.getElementById('cardHistory').innerHTML = '';
            updateCounter();
        }

        /* =========================================================
           ПОЛНЫЙ СБРОС
        ========================================================= */
        function resetAll() {
            // Характеристики
            turn = 1;
            document.getElementById('turn').textContent = 1;
            stats.hp.value      = 10;
            stats.attack.value  = 5;
            stats.capture.value = 3;
            stats.defense.value = 7;
            document.getElementById('hp').textContent      = 10;
            document.getElementById('attack').textContent  = 5;
            document.getElementById('capture').textContent = 3;
            document.getElementById('defense').textContent = 7;

            // Колода
            resetDeck();
        }

        /* Инициализация счётчика */
        updateCounter();
    </script>

</body>
